name: Android Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'app.js'
      - 'native-bridge.js'
      - 'icon.svg'
      - 'manifest.webmanifest'
      - 'capacitor.config.json'
      - 'package.json'
      - 'scripts/build-native-assets.js'
      - '.github/workflows/android-release.yml'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build native web assets
        run: npm run build:native

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Build unsigned release APK and AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyeongtaek-stitch-unsigned-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

      - name: Prepare signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No signing key configured. Skipping signed release build."
            echo "HAS_SIGNING=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
          echo "HAS_SIGNING=true" >> "$GITHUB_ENV"

      - name: Build signed release APK and AAB
        if: env.HAS_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload signed release artifacts
        if: env.HAS_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pyeongtaek-stitch-signed-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
