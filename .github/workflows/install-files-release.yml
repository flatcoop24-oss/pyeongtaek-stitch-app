name: Install Files Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-files-release.yml'

permissions:
  contents: write

jobs:
  android-install-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build native web assets
        run: npm run build:native

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Build installable debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Prepare Android install file
        run: |
          mkdir -p install-files/android
          cp android/app/build/outputs/apk/debug/*.apk install-files/android/pyeongtaek-stitch-android-debug.apk

      - name: Upload Android install file
        uses: actions/upload-artifact@v4
        with:
          name: android-install-file
          path: install-files/android/*

  iphone-ad-hoc-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Apple signing secrets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p install-files/ios
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_PROVISIONING_PROFILE_BASE64" ] || [ -z "$APPLE_TEAM_ID" ]; then
            cat > install-files/ios/IOS_AD_HOC_SIGNING_REQUIRED.txt <<EOF
          iPhone installable IPA was not created because Apple signing secrets are not configured.

          Add these GitHub Actions secrets, then rerun this workflow:
          - APPLE_CERTIFICATE_P12_BASE64
          - APPLE_CERTIFICATE_PASSWORD
          - APPLE_PROVISIONING_PROFILE_BASE64
          - APPLE_TEAM_ID
          - APPLE_BUNDLE_ID=kr.flatcoop.pyeongtaekstitch
          - IOS_EXPORT_METHOD=ad-hoc

          The provisioning profile must be an Ad Hoc profile that includes the target iPhone UDIDs.
          EOF
            echo "HAS_IOS_SIGNING=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "HAS_IOS_SIGNING=true" >> "$GITHUB_ENV"

      - name: Setup Node
        if: env.HAS_IOS_SIGNING == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: env.HAS_IOS_SIGNING == 'true'
        run: npm install

      - name: Build native web assets
        if: env.HAS_IOS_SIGNING == 'true'
        run: npm run build:native

      - name: Add iOS platform
        if: env.HAS_IOS_SIGNING == 'true'
        run: npx cap add ios

      - name: Sync iOS platform
        if: env.HAS_IOS_SIGNING == 'true'
        run: npx cap sync ios

      - name: Import Apple signing assets
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive iOS app
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          BUNDLE_ID="${APPLE_BUNDLE_ID:-kr.flatcoop.pyeongtaekstitch}"
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath install-files/PyeongtaekStitch.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive
          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"

      - name: Export Ad Hoc IPA
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
        run: |
          EXPORT_METHOD="${IOS_EXPORT_METHOD:-ad-hoc}"
          cat > install-files/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath install-files/PyeongtaekStitch.xcarchive \
            -exportOptionsPlist install-files/ExportOptions.plist \
            -exportPath install-files/ios
          mv install-files/ios/*.ipa install-files/ios/pyeongtaek-stitch-iphone-ad-hoc.ipa

      - name: Upload iPhone install file
        uses: actions/upload-artifact@v4
        with:
          name: iphone-install-file
          path: install-files/ios/*

  publish-release:
    runs-on: ubuntu-latest
    needs: [android-install-apk, iphone-ad-hoc-ipa]
    if: always() && needs.android-install-apk.result == 'success' && needs.iphone-ad-hoc-ipa.result == 'success'

    steps:
      - name: Download install files
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: install-files-${{ github.run_number }}-${{ github.run_attempt }}
          name: 평택 한땀 여행 설치파일 ${{ github.run_number }}-${{ github.run_attempt }}
          body: |
            평택 한땀 여행 설치파일입니다.

            Android:
            - pyeongtaek-stitch-android-debug.apk 파일을 내려받아 설치하세요.

            iPhone:
            - pyeongtaek-stitch-iphone-ad-hoc.ipa가 있으면 Ad Hoc 등록 기기에서 설치할 수 있습니다.
            - IOS_AD_HOC_SIGNING_REQUIRED.txt만 있으면 Apple 서명 Secrets가 아직 설정되지 않은 상태입니다.
            - iPhone은 App Store 없이 배포하려면 설치 대상 기기 UDID가 포함된 Ad Hoc 프로비저닝 프로파일이 필요합니다.
          files: release-files/**/*
