<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6f65">
    <title>평택 한땀 여행</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">평택 8경 포토 십자수</p>
          <h1>평택 한땀 여행</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="초기화" title="초기화">↺</button>
      </header>

      <main>
        <section class="hero-panel" aria-label="십자수 진행 현황">
          <div class="progress-ring" aria-hidden="true">
            <span id="progressPercent">0%</span>
          </div>
          <div>
            <p class="hero-kicker">8개 도안, 칸마다 사진 한 장</p>
            <p class="hero-copy">평택 8경 도안을 선택하고 각 실 번호 칸을 하나씩 채웁니다. 같은 기호여도 사진은 칸마다 따로 저장됩니다.</p>
          </div>
        </section>

        <section class="pattern-section" aria-labelledby="patternTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Pattern sheet</p>
              <h2 id="patternTitle">도안 선택</h2>
            </div>
            <div class="count-stack">
              <span class="count-badge">도안 <b id="doneCount">1</b>/8</span>
              <span class="count-badge">작업 <b id="stitchCount">0</b>/<span id="totalStitchCount">0</span></span>
            </div>
          </div>

          <div class="pattern-picker" id="patternPicker" aria-label="평택 8경 도안 선택"></div>

          <div class="pattern-wrap">
            <div class="sheet-toolbar">
              <button class="is-active" id="symbolModeButton" type="button">기호</button>
              <button id="colorModeButton" type="button">색상</button>
              <button id="photoModeButton" type="button">사진</button>
            </div>
            <div class="stitch-grid" id="stitchGrid" aria-label="평택 8경 십자수 도안"></div>
          </div>
        </section>

        <section class="legend-section" aria-labelledby="legendTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Thread table</p>
              <h2 id="legendTitle">색상표</h2>
            </div>
          </div>
          <div class="legend-table" id="legendTable"></div>
        </section>

        <section class="spot-section" aria-labelledby="spotTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Travel points</p>
              <h2 id="spotTitle">촬영 포인트</h2>
            </div>
          </div>
          <div class="spot-list" id="spotList"></div>
        </section>
      </main>

      <footer class="bottom-nav" aria-label="앱 메뉴">
        <a href="#patternTitle">도안</a>
        <a href="#legendTitle">표</a>
        <a href="#spotTitle">8경</a>
        <button id="shareButton" type="button">공유</button>
        <button id="downloadButton" type="button">저장</button>
      </footer>
    </div>

    <input id="photoInput" class="visually-hidden" type="file" accept="image/*" capture="environment">
    <dialog id="spotDialog">
      <form method="dialog">
        <button class="dialog-close" value="close" aria-label="닫기">×</button>
      </form>
      <div class="dialog-photo" id="dialogPhoto"></div>
      <p class="eyebrow" id="dialogIndex"></p>
      <h3 id="dialogTitle"></h3>
      <p id="dialogDescription"></p>
      <div class="dialog-actions">
        <button id="cameraButton" type="button">사진 찍기</button>
        <button id="markCellButton" type="button">작업 완료</button>
        <button id="clearSpotButton" type="button">사진 비우기</button>
      </div>
    </dialog>

    <canvas id="colorCanvas" width="32" height="32" aria-hidden="true"></canvas>
    <script src="./app.js"></script>
  </body>
</html>
