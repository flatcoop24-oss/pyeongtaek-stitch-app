services:
  - type: web
    name: pyeongtaek-stitch-app
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.13.0
    disk:
      name: pyeongtaek-stitch-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
